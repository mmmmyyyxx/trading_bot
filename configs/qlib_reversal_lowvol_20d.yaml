qlib_init:
  provider_uri: "data/qlib_cn_ashare"
  region: cn

market: &market all
benchmark: &benchmark SH000300

data_handler_config: &data_handler_config
  start_time: 2020-01-01
  end_time: 2023-12-31
  instruments: *market
  infer_processors: []
  learn_processors:
    - class: DropnaLabel
    - class: CSRankNorm
      kwargs:
        fields_group: label
  data_loader:
    class: QlibDataLoader
    module_path: qlib.data.dataset.loader
    kwargs:
      config:
        feature:
          - ["-1 * ($close / Ref($close, 20) - 1)", "-1 * Std($close / Ref($close, 1) - 1, 60)"]
          - ["short_term_reversal", "low_volatility"]
        label:
          - ["Ref($close, -21) / Ref($close, -1) - 1"]
          - ["LABEL0"]
      filter_pipe:
        - filter_type: ExpressionDFilter
          rule_expression: "$selected > 0.5"
          filter_start_time: 2020-01-01
          filter_end_time: 2023-12-31
          keep: false

port_analysis_config: &port_analysis_config
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 50
      n_drop: 5
  backtest:
    start_time: 2022-01-01
    end_time: 2023-12-31
    account: 100000000
    benchmark: *benchmark
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: close
      open_cost: 0.00031
      close_cost: 0.00081
      min_cost: 5

task:
  model:
    class: LinearModel
    module_path: qlib.contrib.model.linear
    kwargs:
      estimator: ridge
      alpha: 1.0
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: DataHandlerLP
        module_path: qlib.data.dataset.handler
        kwargs: *data_handler_config
      segments:
        train: [2020-01-01, 2021-12-31]
        valid: [2022-01-01, 2022-06-30]
        test: [2022-07-01, 2023-12-31]
  record:
    - class: SignalRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        model: <MODEL>
        dataset: <DATASET>
    - class: SigAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        ana_long_short: false
        ann_scaler: 252
    - class: PortAnaRecord
      module_path: qlib.workflow.record_temp
      kwargs:
        config: *port_analysis_config
